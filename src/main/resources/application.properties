spring.application.name=spring-wiring-mcp

# stdio uses stdout for JSON-RPC framing: no banner, no embedded web server.
spring.main.web-application-type=none
spring.main.banner-mode=off

spring.ai.mcp.server.stdio=true
spring.ai.mcp.server.name=spring-wiring-mcp
spring.ai.mcp.server.version=0.1.0
spring.ai.mcp.server.annotation-scanner.enabled=true

# Keep application logs off stdout; they would otherwise corrupt the JSON-RPC stream.
# logback-spring.xml defines a file-only configuration (no console appender).
logging.file.name=logs/spring-wiring-mcp.log
